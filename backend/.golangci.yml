version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gofmt
    - gocritic
    - misspell
    - noctx
    - exhaustive
    - bodyclose
  settings:
    gosec:
      excludes:
        - G104
    gocritic:
      enabled-tags:
        - diagnostic
        - performance

issues:
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
