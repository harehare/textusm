name: create tag
on:
  pull_request:
    branches:
      - main
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Get app version
        id: package-version
        run: echo "current-version=$(node -p "require('./frontend/package.json').version")" >> $GITHUB_OUTPUT
      - name: tag is already existing to GITHUB_ENV
        run: |
          tag_is_existing=$(
            git fetch origin v${{ steps.package-version.outputs.current-version }} &&
            echo true ||
            echo false
          )
          echo "TAG_IS_EXISTING=${tag_is_existing}" >> $GITHUB_ENV
      - if: env.TAG_IS_EXISTING == 'false'
        run: |
          git tag v${{ steps.package-version.outputs.current-version }}
          git push origin v${{ steps.package-version.outputs.current-version }}
      - name: Build Changelog
        if: env.TAG_IS_EXISTING == 'false'
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        if: env.TAG_IS_EXISTING == 'false'
        uses: marvinpinto/action-automatic-releases@v1.2.1
        with:
          automatic_release_tag: v${{ steps.package-version.outputs.current-version }}
          prerelease: false
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
